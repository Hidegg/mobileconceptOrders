<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mobile Concept GSM</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23151518'/><text x='50' y='68' font-size='50' font-family='Arial' font-weight='bold' fill='%238176FF' text-anchor='middle'>MC</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;scrollbar-width:none;-ms-overflow-style:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
:root{
  --bg:#0d0c12;
  --surface:#1c1b1b;
  --surface2:#242330;
  --border:#2d2b40;
  --text:#F4EDFF;
  --text2:#D4D4D4;
  --text3:#6a6880;
  --accent:#8176FF;
  --accent-light:rgba(129,118,255,.12);
  --accent-hover:#9a91ff;
  --accent2:#61CE70;
  --btn-bg:#534D9F;
  --btn-hover:#6B5EFF;
  --header-bg:#151518;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,.5);
}

/* ── Body ── */
body{background:transparent;color:#fff;font-family:'Montserrat',sans-serif}

/* ── Booking overlay backdrop ── */
#booking-overlay{
  display:flex;
  position:fixed;top:0;right:0;bottom:0;left:0;
  background:rgba(0,0,0,.88);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-family:'Work Sans',sans-serif;
  color:var(--text);
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .3s ease, visibility .3s;
}
#booking-overlay.open{
  opacity:1;
  visibility:visible;
  pointer-events:all;
}

/* ── Modal card ── */
#booking-modal{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:20px;
  max-width:540px;
  width:100%;
  max-height:calc(100vh - 40px);
  max-height:calc(100svh - 40px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.85);
  opacity:0;
  transform:translateY(32px) scale(0.97);
  transition:opacity .4s ease, transform .45s cubic-bezier(0.34,1.4,0.64,1);
}
#booking-overlay.open #booking-modal{
  opacity:1;
  transform:translateY(0) scale(1);
}
@media(min-width:900px){
  #booking-modal{max-height:calc(100vh - 48px);max-height:calc(100dvh - 48px)}
  #booking-modal.modal-wide{max-width:820px}
  .container.wide-container{max-width:100%}
}

/* ── Modal header (steps + title + back + close) ── */
.modal-header{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 16px 20px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  position:relative;
}
.modal-header-center{
  display:flex;align-items:center;justify-content:center;
}
.modal-title{
  font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:700;
  color:var(--text);letter-spacing:.2px;text-align:center;
  padding:30px 16px 2px;flex-shrink:0;
}

/* ── Modal scrollable body ── */
#booking-scroll{
  overflow-y:auto;
  flex:1;
  scrollbar-width:none;-ms-overflow-style:none;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
}
#booking-scroll::-webkit-scrollbar{display:none}

/* ── Close button ── */
#close-booking{
  position:absolute;right:8px;
  background:none;border:none;
  color:var(--text2);font-size:1.1rem;
  cursor:pointer;border-radius:50%;line-height:1;
  transition:color .15s,background .15s;
  min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
}
#close-booking:hover{color:var(--text);background:var(--surface2)}
#close-booking:active{color:var(--text);background:var(--surface2)}


/* ────────────────────────────────────────────
   POPUP STYLES (from serviceCheckout)
──────────────────────────────────────────── */
.container{max-width:520px;width:100%;padding:24px 20px 28px;margin:0 auto}

.steps{
  display:flex;justify-content:center;align-items:center;gap:14px;
  pointer-events:none;
}
.steps .dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);position:relative;
  transition:background .35s,transform .35s,opacity .35s,box-shadow .35s;
}
.steps .dot.done{background:var(--accent);opacity:.35}
.steps .dot.active{background:var(--accent);transform:scale(1.35);box-shadow:0 0 0 4px rgba(129,118,255,.22)}

.step{display:none}
.step.active{display:block}

.step-title{font-family:'Montserrat',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:16px;color:var(--text);text-align:center;letter-spacing:.2px}

.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.svc-card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:20px 12px 16px;cursor:pointer;transition:border-color .15s,background .15s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:8px;position:relative;
}
.svc-card.selected{border-color:var(--accent);background:var(--accent-light)}
.svc-card .name{font-family:'Montserrat',sans-serif;font-weight:600;font-size:.8rem;line-height:1.3;color:var(--text)}
.svc-card .price{font-family:'Montserrat',sans-serif;color:var(--accent);font-weight:700;font-size:.88rem}

.brand-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.brand-card.wide{grid-column:1/-1}
.brand-card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:28px 16px;cursor:pointer;transition:border-color .15s,background .15s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:10px;
}
.brand-card:hover,.brand-card:active{border-color:var(--accent);background:var(--accent-light)}
.brand-card.selected{border-color:var(--accent);background:var(--accent-light)}
.brand-card.placeholder{opacity:.38;cursor:default}
.brand-card.placeholder:hover{border-color:var(--border);box-shadow:var(--shadow)}
.brand-card .brand-icon{width:58px;height:58px;display:flex;align-items:center;justify-content:center;
  background:transparent;border-radius:14px;border:none;overflow:hidden;flex-shrink:0}
.brand-logo{width:54px;height:54px;object-fit:contain;filter:brightness(0) invert(1);opacity:.85}
.brand-card .brand-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1rem}
.brand-card .brand-count{color:var(--text2);font-size:.72rem;margin-top:1px}

.model-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.model-card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;cursor:pointer;transition:border-color .15s,background .15s;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;
  touch-action:manipulation;
}
.model-thumb{-webkit-user-drag:none;user-drag:none;pointer-events:none}
.model-card:hover,.model-card:active{border-color:var(--accent);background:var(--accent-light)}
.model-card.selected{border-color:var(--accent);background:var(--accent-light)}
.model-card .model-name{font-family:'Montserrat',sans-serif;font-weight:600;font-size:.78rem;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.model-thumb{width:64px;height:88px;object-fit:contain;border-radius:0;background:none;flex-shrink:0;padding:4px;-webkit-user-drag:none;user-drag:none;pointer-events:none}

#back-btn{
  position:absolute;left:8px;
  background:none;border:none;color:var(--text2);font-size:1.25rem;
  cursor:pointer;border-radius:50%;line-height:1;
  transition:color .15s,background .15s;
  display:none;align-items:center;justify-content:center;
  min-width:44px;min-height:44px;
}
#back-btn:hover{color:var(--accent);background:var(--surface2)}
#back-btn:active{color:var(--accent);background:var(--surface2)}



.date-section{margin-bottom:22px}
.date-section label{display:block;font-weight:600;margin-bottom:8px;font-size:.88rem;color:var(--text2)}
.flatpickr-input{
  width:100%;padding:13px 14px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-family:inherit;font-size:.92rem;
  box-shadow:var(--shadow);outline:none;transition:border .15s;
}
.flatpickr-input:focus{border-color:var(--accent)}
.desc-hint{font-size:.75rem;color:var(--text3);margin-top:8px;line-height:1.5;text-align:center}
.time-slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.time-slot{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:16px 8px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);
}
.time-slot:hover{border-color:var(--text3)}
.time-slot:active{border-color:var(--accent);background:var(--accent-light)}
.time-slot.selected{border-color:var(--accent);background:var(--accent-light)}
.time-slot .label{font-weight:600;font-size:.85rem}
.time-slot .hours{color:var(--text2);font-size:.72rem;margin-top:3px}

.summary-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;
}
.summary-card h3{font-family:'Montserrat',sans-serif;margin-bottom:10px;font-size:.85rem;display:flex;align-items:center;gap:6px}
.summary-line{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.84rem}
.summary-line:last-child{border:none}
.summary-line .lbl{color:var(--text2)}
.summary-line .val{font-weight:600}
.summary-services{margin-bottom:12px}
.summary-svc-item{display:flex;justify-content:space-between;padding:6px 0;font-size:.86rem}
.summary-total{border-top:2px solid var(--accent);padding-top:12px;margin-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem}
.summary-total .val{color:var(--accent)}
.edit-link{color:var(--accent);font-size:.78rem;cursor:pointer;text-decoration:none;font-weight:500}
.edit-link:hover{text-decoration:underline}

.receipt-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;
}
.receipt-section{padding:8px 14px}
.receipt-section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.receipt-lbl{
  font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--text3);
}
.receipt-divider{height:1px;background:var(--border)}
.receipt-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:4px 0;font-size:.83rem;
}
.receipt-row .lbl{color:var(--text2)}
.receipt-row .val{font-weight:600;text-align:right;max-width:58%}
.receipt-total{
  padding:10px 14px;background:var(--surface2);
  border-top:2px solid var(--accent);
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Montserrat',sans-serif;font-weight:700;font-size:.95rem;
}
.receipt-card .summary-svc-item{padding:4px 0;font-size:.84rem}

#step-2 .btn, #step-3 .btn{padding:14px;margin-top:14px}
#btn-next-0{margin-top:24px}

.btn{
  width:100%;padding:12px;border:none;border-radius:9999px;
  font-family:'Montserrat',sans-serif;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .15s;margin-top:10px;letter-spacing:.3px;
}
.btn-primary{background:var(--btn-bg);color:#fff}
.btn-primary:hover{background:var(--btn-hover)}
.btn-primary:disabled{background:#2a2938;color:#4a4860;cursor:not-allowed;transform:none}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-hover)}
.btn-accent:disabled{background:#2a2938;color:#4a4860;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--surface2)}
.btn-back{background:none;color:var(--text2);border:none;font-size:.82rem;margin-top:10px;cursor:pointer;padding:8px 0}
.btn-back:hover{color:var(--accent)}

#revolut-pay{margin-top:8px;min-height:0;max-width:200px;margin-left:auto;margin-right:auto}
.payment-placeholder{
  background:var(--surface2);border:2px dashed var(--border);border-radius:var(--radius);
  padding:28px;text-align:center;color:var(--text2);font-size:.82rem;margin-top:16px;
}

.confirm-check{
  width:48px;height:48px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.confirm-check svg{width:24px;height:24px;stroke:#fff;stroke-width:3;fill:none}
.confirm-title{font-family:'Montserrat',sans-serif;text-align:center;font-size:1.05rem;font-weight:700;margin-bottom:4px}
.confirm-sub{text-align:center;color:var(--text2);font-size:.82rem;margin-bottom:12px;line-height:1.5}
.order-id{text-align:center;color:var(--text3);font-size:.75rem;margin-bottom:12px;font-family:'Courier New',monospace;letter-spacing:.5px}

@media(min-width:600px){
  .model-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:480px){
  .choice-card{padding:18px 14px 16px;gap:12px}
  .choice-icon-wrap{width:44px;height:44px;font-size:1.3rem}
}
@media(max-width:380px){
  .services-grid{grid-template-columns:1fr}
  .time-slots{grid-template-columns:1fr 1fr !important}
  .pay-methods{flex-direction:column}
  .pay-methods .pay-btn{width:100%}
  .container{padding:20px 12px 32px}
  .svc-card{padding:14px 12px}
  .choice-card{padding:14px 12px 14px;gap:10px}
  .choice-icon-wrap{width:40px;height:40px;font-size:1.15rem}
  .choice-title{font-size:.95rem}
  .choice-sub{font-size:.74rem}
}

.choice-grid{display:flex;flex-direction:column;gap:16px;margin-top:14px}
.choice-card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:26px 22px 24px;cursor:pointer;
  transition:border-color .18s,background .18s;
  box-shadow:var(--shadow);
  display:flex;flex-direction:row;align-items:flex-start;gap:18px;
}

.choice-card:active{transition-duration:.08s}
.choice-card-servicii:hover,.choice-card-servicii:active,.choice-card-servicii.selected{
  border-color:var(--accent);background:var(--accent-light);
}
.choice-card-diagnoza:hover,.choice-card-diagnoza:active,.choice-card-diagnoza.selected{
  border-color:#22c55e;background:rgba(34,197,94,.07);
}
.choice-icon-wrap{
  width:52px;height:52px;border-radius:14px;
  background:rgba(129,118,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:1.55rem;flex-shrink:0;
}
.choice-icon-wrap.green{background:rgba(34,197,94,.1)}
.choice-body{flex:1}
.choice-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.05rem;line-height:1.3}
.choice-sub{font-size:.79rem;color:var(--text2);margin-top:5px;line-height:1.45}
.choice-range{font-family:'Montserrat',sans-serif;font-weight:700;font-size:.85rem;color:var(--accent);margin-top:6px}
.choice-price-zero{font-family:'Montserrat',sans-serif;font-weight:800;font-size:.85rem;color:#22c55e;margin-top:6px}
.choice-tags{display:flex;gap:5px;flex-wrap:nowrap;margin-top:12px;overflow:hidden}
.choice-tag{font-size:.7rem;border-radius:999px;padding:3px 8px;font-family:'Montserrat',sans-serif;white-space:nowrap}
.choice-card-servicii .choice-tag{color:var(--accent);background:var(--accent-light)}
.choice-card-diagnoza .choice-tag{color:#22c55e;background:rgba(34,197,94,.1)}
.choice-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:8px;flex-shrink:0;padding-top:2px}
.choice-arrow{color:var(--text3);font-size:1.1rem;line-height:1}
.choice-gratis{
  font-family:'Montserrat',sans-serif;font-weight:800;font-size:.78rem;
  color:#22c55e;letter-spacing:.5px;
  background:rgba(34,197,94,.12);padding:3px 10px;border-radius:999px;
}

/* ── Tap animations ── */
@keyframes brand-tap {
  0%   { transform:scale(1); }
  28%  { transform:scale(.95);  border-color:var(--accent); box-shadow:0 0 0 5px rgba(129,118,255,.22); background:var(--accent-light); }
  62%  { transform:scale(1.02); border-color:var(--accent); box-shadow:0 0 0 3px rgba(129,118,255,.14); background:var(--accent-light); }
  100% { transform:scale(1);    border-color:var(--border); box-shadow:none; background:var(--surface); }
}
@keyframes diagnoza-tap {
  0%   { transform:scale(1); }
  28%  { transform:scale(.95);  border-color:#22c55e; box-shadow:0 0 0 5px rgba(34,197,94,.22); background:rgba(34,197,94,.07); }
  62%  { transform:scale(1.02); border-color:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.14); background:rgba(34,197,94,.07); }
  100% { transform:scale(1);    border-color:var(--border); box-shadow:none; background:var(--surface); }
}
.brand-card.tapping,.model-card.tapping,.choice-card-servicii.tapping {
  animation:brand-tap 340ms cubic-bezier(.25,.8,.25,1) forwards;
  pointer-events:none;transition:none;
}
.choice-card-diagnoza.tapping {
  animation:diagnoza-tap 340ms cubic-bezier(.25,.8,.25,1) forwards;
  pointer-events:none;transition:none;
}


/* ── Mobile / Touch fixes ── */
#booking-scroll.scroll-locked{overflow-y:hidden !important}

/* Touch tap highlight — JS-driven via touchstart/touchend, reliable on iOS */
.brand-card.touch-active:not(.placeholder){border-color:var(--accent);background:var(--accent-light)}
.model-card.touch-active{border-color:var(--accent);background:var(--accent-light)}

.time-slot.touch-active{border-color:var(--accent);background:var(--accent-light)}
.choice-card-servicii.touch-active{border-color:var(--accent);background:var(--accent-light);box-shadow:0 6px 20px rgba(129,118,255,.18)}
.choice-card-diagnoza.touch-active{border-color:#22c55e;background:rgba(34,197,94,.07);box-shadow:0 6px 20px rgba(34,197,94,.15)}

/* On touch devices: disable hover (fires on scroll), keep :active for tap feedback */
@media(hover:none){

  .brand-card:hover{border-color:var(--border);background:var(--surface)}
  .brand-card.placeholder:hover{border-color:var(--border)}
  .model-card:hover{border-color:var(--border);background:var(--surface)}

  .choice-card:hover{box-shadow:var(--shadow)}
  .choice-card-servicii:hover{border-color:var(--border);background:var(--surface);box-shadow:var(--shadow)}
  .choice-card-diagnoza:hover{border-color:var(--border);background:var(--surface);box-shadow:var(--shadow)}
  .time-slot:hover{border-color:var(--border);transform:none}
  .btn-primary:hover{background:var(--btn-bg)}
  .btn-accent:hover{background:var(--accent)}
  .btn-secondary:hover{background:var(--surface)}
  .btn-back:hover{color:var(--text2)}
  #close-booking:hover{color:var(--text2);background:none}
  #back-btn:hover{color:var(--text2);background:none}
  .edit-link:hover{text-decoration:none}
}

/* Safe area padding for notch / home indicator (iPhone X+, Android) */
@supports(padding:max(0px)){
  #booking-overlay{
    padding:max(20px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left))
  }
}

/* ── Flatpickr theme — match app palette ── */
.flatpickr-calendar{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  font-family:'Work Sans',sans-serif;
  color:var(--text);
}
.flatpickr-calendar.arrowTop:before{border-bottom-color:var(--border)}
.flatpickr-calendar.arrowTop:after{border-bottom-color:var(--surface)}
.flatpickr-calendar.arrowBottom:before{border-top-color:var(--border)}
.flatpickr-calendar.arrowBottom:after{border-top-color:var(--surface)}
.flatpickr-months{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0}
.flatpickr-months .flatpickr-month{background:var(--surface);color:var(--text);fill:var(--text);height:44px}
.flatpickr-months .flatpickr-prev-month,.flatpickr-months .flatpickr-next-month{fill:var(--text2);top:10px}
.flatpickr-months .flatpickr-prev-month:hover svg,.flatpickr-months .flatpickr-next-month:hover svg{fill:var(--accent)}
.flatpickr-current-month{color:var(--text)}
.flatpickr-current-month .flatpickr-monthDropdown-months{background:var(--surface);color:var(--text);border:none;font-weight:600}
.flatpickr-current-month input.cur-year{color:var(--text);font-weight:600}
.flatpickr-weekdays{background:var(--surface2)}

// Web Worker for background payment status polling (runs even when tab is backgrounded)
const PAYMENT_WORKER_URL = (function() {
  try {
    return URL.createObjectURL(new Blob([
      'var t=null;self.onmessage=function(e){' +
      'if(e.data.cmd==="start"){clearInterval(t);var u=e.data.url,n=0;' +
      't=setInterval(function(){if(++n>300){clearInterval(t);return;}' +
      'fetch(u).then(function(r){return r.json();})' +
      '.then(function(d){if(d.status==="completed"){clearInterval(t);self.postMessage(d);}})' +
      '.catch(function(){});},1000);}' +
      'if(e.data.cmd==="stop"){clearInterval(t);}};'
    ], { type: "application/javascript" }));
  } catch(e) { return null; }
})();



async function loadPrices() {
  try {
    const resp = await fetch(`${CONFIG.API_BASE}/api/prices`);
    if (!resp.ok) return;
    const data = await resp.json();
    BRANDS.forEach(b => {
      if (!data[b.id]) return;
      Object.entries(data[b.id]).forEach(([model, services]) => {
        b.data[model] = services;
      });
    });
  } catch (e) {
    console.warn('[Prices] Could not load from API, using built-in defaults');
  }
}

/* ── Open / Close overlay ── */
let _bodyScrollY = 0;
function openBooking() {
  _bodyScrollY = window.scrollY || window.pageYOffset;
  document.body.style.overflow = "hidden";
  document.body.style.position = "fixed";
  document.body.style.top = `-${_bodyScrollY}px`;
  document.body.style.width = "100%";
  document.body.style.webkitOverflowScrolling = "auto";
  document.getElementById("booking-overlay").classList.add("open");
  if (window.parent !== window) {
    window.parent.postMessage({ action: "openBooking" }, "*");
  }
  initDatePicker(); initTimeSlots();
}
function closeBooking() {
  document.getElementById("booking-overlay").classList.remove("open");
  document.body.style.overflow = "";
  document.body.style.position = "";
  document.body.style.top = "";
  document.body.style.width = "";
  document.body.style.webkitOverflowScrolling = "";
  window.scrollTo(0, _bodyScrollY);
  resetAll();
  // Signal parent WordPress page to hide the iframe overlay
  if (window.parent !== window) {
    window.parent.postMessage({ action: "closeBooking" }, "*");
  }
}

function genericSlug(name) {
  return name.toLowerCase()
    .replace(/\+/g, '-plus')
    .replace(/[()\/]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function getPhoneImageUrl(brandId, modelName) {
  if (brandId === "iphone") {
    const slug = modelName.toLowerCase()
      .replace(/[()\/+]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-|-$/g, "");
    return `iphonePics/processed/${slug}.webp`;
  }
  if (brandId === "samsung") {
    let name = modelName.replace(/^Samsung\s+/i,"");
    if (!/^galaxy\s/i.test(name)) name = "Galaxy " + name;
    const slug = name.toLowerCase().replace(/[()\/+]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
    return `samsungPics/processed/samsung-${slug}.webp`;
  }
  const folders = {
    huawei: "huaweiPics", honor: "honorPics", xiaomi: "xiaomiPics",
    oppo: "oppoPics", motorola: "motorolaPics", oneplus: "oneplusPics",
    realme: "realmePics", google: "googlePics"
  };
  if (folders[brandId]) return `${folders[brandId]}/processed/${genericSlug(modelName)}.webp`;
  return null;
}

const PHONE_FALLBACK = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238176FF' stroke-width='1.5'%3E%3Crect x='5' y='1' width='14' height='22' rx='3' ry='3'/%3E%3Ccircle cx='12' cy='18.5' r='.8' fill='%238176FF' stroke='none'/%3E%3C/svg%3E";

function onPhoneImgError(el) {
  el.onerror = null;
  el.src = PHONE_FALLBACK;
}

let state = { brand: null, series: null, model: null, cart: [], date: null, timeSlot: null, name: "", phone: "", orderId: null, mode: null, view: 'brand', description: "" };
let currentStep = 0;
let navDir = 1;

const EASE_OUT = 'cubic-bezier(0.22,1,0.36,1)';
const ANIM_MS  = 300;

function _absorbClicks(ms) {
  const shield = document.createElement('div');
  shield.style.cssText = 'position:fixed;inset:0;z-index:99999;';
  document.body.appendChild(shield);
  setTimeout(() => shield.remove(), ms || 600);
}

function animateIn(el) {
  const x = navDir * 26;
  navDir = 1;
  el.style.willChange = 'transform, opacity';
  el.style.transition = 'none';
  el.style.opacity    = '0';
  el.style.transform  = `translateX(${x}px)`;
  el.getBoundingClientRect(); // force style flush so initial state is committed
  el.style.transition = `opacity ${ANIM_MS}ms ${EASE_OUT}, transform ${ANIM_MS}ms ${EASE_OUT}`;
  el.style.opacity    = '1';
  el.style.transform  = 'translateX(0)';
  el.addEventListener('transitionend', () => {
    el.style.willChange = '';
    el.style.opacity = el.style.transform = el.style.transition = '';
  }, { once: true });
}


function setModalSize(cls) {
  const modal = document.getElementById('booking-modal');
  modal.classList.remove('modal-wide');
  if (cls) modal.classList.add(cls);
}

function setScrollable(enable) {
  document.getElementById('booking-scroll').classList.toggle('scroll-locked', !enable);
}

document.addEventListener("DOMContentLoaded", async () => {
  // Load config
  try {
    const cfg = await fetch(`${CONFIG.API_BASE}/api/config`).then(r => r.json());
    CONFIG.shop_phone = cfg.shop_phone || "";
  } catch (e) {
    console.warn("Could not load config:", e);
  }

  // Handle return from Revolut redirect (fallback path)
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("confirmed") === "1") {
    await loadPrices();
    openBooking();
    document.querySelector(".confirm-title").textContent = "Plata efectuata cu succes!";
    document.querySelector(".confirm-sub").innerHTML = "Reparatia ta a fost programata.<br>Te vom contacta in scurt timp.";
    const oid = urlParams.get("order_id") || "";
    document.getElementById("order-id").textContent = oid ? `Comanda ${oid}` : "";
    goStep(3);
    window.history.replaceState({}, "", "/");
    return;
  }
  if (urlParams.get("payment_error")) {
    localStorage.removeItem("gsm_pending_order");
    await loadPrices();
    openBooking();
    showBrands();
    alert("Plata a esuat sau a fost anulata. Te rugam sa incerci din nou.");
    window.history.replaceState({}, "", "/");
    return;
  }

  // User returned from Revolut checkout — check if webhook already confirmed the payment
  const pendingOrderId = localStorage.getItem("gsm_pending_order");
  if (pendingOrderId) {
    localStorage.removeItem("gsm_pending_order");
    try {
      let data = await fetch(`${CONFIG.API_BASE}/api/order-status/${pendingOrderId}`).then(r => r.json());
      if (data.status === "pending") {
        // Webhook may still be in flight — wait briefly and retry once
        await new Promise(r => setTimeout(r, 2000));
        data = await fetch(`${CONFIG.API_BASE}/api/order-status/${pendingOrderId}`).then(r => r.json());
      }
      if (data.status === "completed") {
        await loadPrices();
        openBooking();
        document.querySelector(".confirm-title").textContent = "Plata efectuata cu succes!";
        document.querySelector(".confirm-sub").innerHTML = "Reparatia ta a fost programata.<br>Te vom contacta in scurt timp.";
        document.getElementById("order-id").textContent = `Comanda ${data.order_id}`;
        goStep(3);
        return;
      }
    } catch (e) { /* network error — fall through to normal booking */ }
  }

  await loadPrices();
  showBrands(); if (window.parent === window) setTimeout(openBooking, 80);

  // Prevent background scroll when touching outside the scrollable area or when locked.
  // IMPORTANT: never prevent on the modal header — that kills the back/close buttons.
  document.getElementById('booking-overlay').addEventListener('touchmove', function(e) {
    const scroll = document.getElementById('booking-scroll');
    const header = document.querySelector('.modal-header');
    if (header && header.contains(e.target)) return; // always let header touches through
    const inScroll = scroll.contains(e.target);
    const isLocked = scroll.classList.contains('scroll-locked');
    if (!inScroll || isLocked) e.preventDefault();
  }, { passive: false });

  // Touch tap visual feedback — mirrors desktop hover, driven by touchstart/touchmove/touchend
  // so it works reliably on iOS (CSS :active alone is unreliable on divs).
  (function() {
    const SELECTOR = '.brand-card:not(.placeholder),.model-card,.time-slot,.choice-card';
    const MOVE_THRESHOLD = 8;
    let activeCard = null, startX = 0, startY = 0;
    function clearActive() {
      if (activeCard) { activeCard.classList.remove('touch-active'); activeCard = null; }
    }
    const scroll = document.getElementById('booking-scroll');
    scroll.addEventListener('touchstart', function(e) {
      clearActive();
      const card = e.target.closest ? e.target.closest(SELECTOR) : null;
      if (!card) return;
      activeCard = card;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      card.classList.add('touch-active');
    }, { passive: true });
    scroll.addEventListener('touchmove', function(e) {
      if (!activeCard) return;
      const dx = Math.abs(e.touches[0].clientX - startX);
      const dy = Math.abs(e.touches[0].clientY - startY);
      if (dx > MOVE_THRESHOLD || dy > MOVE_THRESHOLD) clearActive();
    }, { passive: true });
    scroll.addEventListener('touchend', function() {
      if (activeCard) setTimeout(clearActive, 180);
    }, { passive: true });
    scroll.addEventListener('touchcancel', clearActive, { passive: true });
  })();

  // ── Ghost-click fix for navigating cards ──────────────────────────────────
  // On iOS, touchstart→touchend synthesizes a click ~300ms later at the original
  // coordinates. If the view has changed by then, the click lands on the new card.
  // Calling preventDefault() on touchstart kills the entire synthesized chain.
  // We then fire the action ourselves on touchend.
  (function() {
    const NAV_SELECTOR = '.choice-card, .brand-card:not(.placeholder)';
    let _tapTarget = null, _tapMoved = false;

    document.getElementById('booking-overlay').addEventListener('touchstart', function(e) {
      const card = e.target.closest(NAV_SELECTOR);
      if (!card) { _tapTarget = null; return; }
      _tapTarget = card;
      _tapMoved  = false;
    }, { passive: true });

    document.getElementById('booking-overlay').addEventListener('touchmove', function() {
      if (_tapTarget) _tapMoved = true;
    }, { passive: true });

    document.getElementById('booking-overlay').addEventListener('touchend', function() {
      if (!_tapTarget || _tapMoved) { _tapTarget = null; return; }
      const card = _tapTarget;
      _tapTarget = null;

      if (card.classList.contains('svc-card')) {
        toggleService(card);

      } else if (card.classList.contains('choice-card')) {
        const mode = card.classList.contains('choice-card-servicii') ? 'servicii'
                   : card.classList.contains('choice-card-diagnoza')  ? 'diagnoza' : null;
        if (mode) selectMode(mode, card);

      } else if (card.classList.contains('brand-card')) {
        const mBrand = (card.getAttribute('onclick') || '').match(/selectBrand\('([^']+)'/);
        const mSeries = (card.getAttribute('onclick') || '').match(/selectSeries\('([^']+)'/);
        if (mBrand) selectBrand(mBrand[1], card);
        else if (mSeries) selectSeries(mSeries[1], card);

      }
    }, { passive: true });
  })();
});

function getSamsungSeriesModels(seriesId) {
  const patterns = {
    S:    m => /^Samsung\s+S\d/i.test(m),
    A:    m => /^Samsung\s+A\d/i.test(m),
    Note: m => /Note/i.test(m),
    Z:    m => /^Samsung\s+Z\s+(Fold|Flip)/i.test(m),
  };
  const fn = patterns[seriesId];
  return fn ? Object.keys(SAMSUNG_DATA).filter(fn) : [];
}

function goBack() {
  navDir = -1;

  if (currentStep === 1) {
    document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
    document.getElementById("step-0").classList.add("active");
    currentStep = 0;
    document.getElementById("booking-scroll").scrollTo({ top: 0, behavior: "smooth" });
    if (state.mode === 'diagnoza') { showChoiceView(); }
    else {
      document.getElementById("choice-view").style.display = "none";
      const svcView = document.getElementById("service-view");
      svcView.style.display = "block";
      animateIn(svcView);
      document.getElementById("btn-next-0").style.display = "block";
      state.view = 'service'; setDot(2); updateBackBtn();
      setScrollable(true);
    }
    return;
  }
  switch (state.view) {
    case 'series': showBrands(); break;
    case 'model': if (state.brand.id === 'samsung') showSeriesView(); else showBrands(); break;
    case 'choice': { if (state.brand.id === 'alte') { showBrands(); break; } const models = Object.keys(state.brand.data); if (models.length === 1) { showBrands(); break; } if (state.series) showModelGrid(getSamsungSeriesModels(state.series)); else showModelGrid(models); break; }
    case 'service': showChoiceView(); break;
    case 'description': showChoiceView(); break;
    default: showBrands();
  }
}

  setScrollable(n === 1 || n === 2);
  const stepTitles = {1:'Programeaza Ridicarea', 2:'Sumar Comanda', 3:'Confirmare'};
  if (stepTitles[n]) document.getElementById('modal-title').textContent = stepTitles[n];
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  const next = document.getElementById(`step-${n}`);
  next.classList.add("active");
  animateIn(next);
  setDot(n + 3);
  currentStep = n;
  updateBackBtn();

function _stopPaymentWorker() {
  if (state.revolutWorker) { state.revolutWorker.terminate(); state.revolutWorker = null; }
  if (state.revolutPoll) { clearInterval(state.revolutPoll); state.revolutPoll = null; }
}

function _startPaymentWorker(orderId, isInIframe, revolutTab) {
  _stopPaymentWorker();
  const pollUrl = window.location.origin + "/api/order-status/" + orderId;
  if (PAYMENT_WORKER_URL) {
    state.revolutWorker = new Worker(PAYMENT_WORKER_URL);
    state.revolutWorker.onmessage = function(ev) {
      _stopPaymentWorker();
      localStorage.removeItem("gsm_pending_order");
      if (isInIframe) {
        window.parent.postMessage({ action: "closeRevolutTab" }, "*");
      } else if (revolutTab && !revolutTab.closed) {
        revolutTab.close();
      }
      showPaymentSuccess(ev.data);
    };
    state.revolutWorker.postMessage({ cmd: "start", url: pollUrl });
  }
  if (!isInIframe) {
    state.revolutPoll = setInterval(function() {
      if (revolutTab && revolutTab.closed) {
        _stopPaymentWorker();
        localStorage.removeItem("gsm_pending_order");
        showPaymentError();
      }
    }, 500);
  }
}

function setPayLoading(loading) {
  const btn = document.getElementById("btn-pay");
  if (loading) { btn.disabled = true; btn.textContent = "Se proceseaza..."; }
  else { btn.disabled = false; btn.innerHTML = `Plateste cu cardul — <span id="pay-amount">${getTotal()}</span> lei`; }
}


async function initiatePayment(method) {
  setPayLoading(true);
  const services = getSelectedServices(), total = getTotal();
  try {
    const orderResp = await fetch(`${CONFIG.API_BASE}/api/create-order`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: total, currency: CONFIG.CURRENCY, services, date: state.date, timeSlot: state.timeSlot, phone: state.phone, name: state.name, model: state.model || "", brand: state.brand.name, description: state.description }),
    });
    const orderData = await orderResp.json();
    state.orderId = orderData.order_id;
    if (orderData.mode === "live" && orderData.revolut_order_token) {
      localStorage.setItem("gsm_pending_order", orderData.order_id);
      startRevolutCheckout(orderData.revolut_order_token);
    } else if (orderData.mode === "mock") {
      showPaymentSuccess({ order_id: orderData.order_id });
    } else {
      throw new Error(orderData.error || "Plata nu a putut fi initiata. Te rugam sa incerci din nou.");
    }
  } catch (err) {
    console.error("Payment error:", err);
    setPayLoading(false);
    alert("Plata a esuat. Te rugam sa incerci din nou.");
  }
}


function showPaymentSuccess(data) {
  _stopPaymentWorker();
  const check = document.querySelector(".confirm-check");
  check.style.background = "";
  check.querySelector("svg").innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  document.querySelector(".confirm-title").textContent = "Plata efectuata cu succes!";
  document.querySelector(".confirm-sub").innerHTML = "Reparatia ta a fost programata.<br>Te vom contacta in scurt timp.";
  document.getElementById("order-id").textContent = data && data.order_id ? `Comanda ${data.order_id}` : "";
  setPayLoading(false); goStep(3);
  fetch(`${CONFIG.API_BASE}/api/notify-order`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ order_id: state.orderId, services: getSelectedServices(), date: state.date, timeSlot: state.timeSlot, amount: getTotal(), phone: state.phone, name: state.name, model: state.model || (state.brand && state.brand.name) || "", description: state.description })
  }).catch(() => {});
}

function showPaymentError() {
  _stopPaymentWorker();
  const check = document.querySelector(".confirm-check");
  check.style.background = "#fee2e2";
  check.querySelector("svg").innerHTML = '<line x1="18" y1="6" x2="6" y2="18" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>';
  document.querySelector(".confirm-title").textContent = "Plata anulata";
  document.querySelector(".confirm-sub").innerHTML = "Plata nu a fost finalizata.<br>Poti incerca din nou.";
  document.getElementById("order-id").textContent = "";
  setPayLoading(false); goStep(3);
}

window.addEventListener("message", function(e) {
  if (!e.data || !e.data.action) return;
  if (e.data.action === "openBooking") { openBooking(); return; }
  if (e.data.action === "paymentDone" && e.data.confirmed === "1") {
    localStorage.removeItem("gsm_pending_order");
    showPaymentSuccess({ order_id: e.data.order_id });
  }
  if (e.data.action === "revolutWindowClosed") {
    const pendingOrderId = localStorage.getItem("gsm_pending_order");
    if (!pendingOrderId) { setPayLoading(false); return; }
    localStorage.removeItem("gsm_pending_order");
    setTimeout(async function() {
      try {
        const data = await fetch(`${CONFIG.API_BASE}/api/order-status/${pendingOrderId}`).then(r => r.json());
        if (data.status === "completed") { showPaymentSuccess(data); return; }
      } catch(e) {}
      showPaymentError();
    }, 1500);
  }
});

function startRevolutCheckout(token) {
  if (!window.RevolutCheckout) {
    setPayLoading(false);
    alert("Sistemul de plata nu s-a incarcat. Reincarca pagina.");
    return;
  }
  RevolutCheckout(token).then(instance => {
    instance.payWithPopup({
      onSuccess() {
        fetch(`${CONFIG.API_BASE}/api/payment-complete`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ order_id: state.orderId }),
        }).catch(() => {});
        showPaymentSuccess({ order_id: state.orderId });
      },
      onError(error) { console.error("Revolut error:", error); setPayLoading(false); alert("Plata a esuat. Te rugam sa incerci din nou."); },
      onCancel() { setPayLoading(false); },
    });
  }).catch(err => { console.error("RevolutCheckout init error:", err); setPayLoading(false); });
}


async function bookFreeAppointment() {
  const services = getSelectedServices();
  const btn = document.getElementById("btn-book-free");
  btn.disabled = true; btn.textContent = "Se programeaza...";
  try {
    const orderResp = await fetch(`${CONFIG.API_BASE}/api/create-order`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ amount:0, currency:CONFIG.CURRENCY, services, date:state.date, timeSlot:state.timeSlot, phone:state.phone, name:state.name, model:state.model || state.brand.name, brand:state.brand.name, description:state.description }) });
    const orderData = await orderResp.json();
    state.orderId = orderData.order_id;
    await fetch(`${CONFIG.API_BASE}/api/payment-complete`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ order_id:state.orderId, services, date:state.date, timeSlot:state.timeSlot, amount:0, phone:state.phone, name:state.name, model:state.model || state.brand.name, brand:state.brand.name, description:state.description }) });
  } catch (err) { console.error("Booking error:", err); }
  btn.disabled = false; btn.textContent = "Programeaza Diagnosticarea";
  const check = document.querySelector(".confirm-check");
  check.style.background = "";
  check.querySelector("svg").innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  document.querySelector(".confirm-title").textContent = "Programare confirmata!";
  document.querySelector(".confirm-sub").innerHTML = "Diagnosticarea a fost programata.<br>Te vom contacta in scurt timp.";
  buildFinalSummary(); goStep(3);
  fetch(`${CONFIG.API_BASE}/api/notify-order`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ order_id: state.orderId, services: getSelectedServices(), date: state.date, timeSlot: state.timeSlot, amount: 0, phone: state.phone, name: state.name, model: state.model || (state.brand && state.brand.name) || "", description: state.description })
  }).catch(() => {});
}

async function completePayment(services, total) {
  const check = document.querySelector(".confirm-check");
  check.style.background = "";
  check.querySelector("svg").innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  document.querySelector(".confirm-title").textContent = "Plata efectuata cu succes!";
  document.querySelector(".confirm-sub").innerHTML = "Reparatia ta a fost programata.<br>Te vom contacta in scurt timp.";
  try {
    await fetch(`${CONFIG.API_BASE}/api/payment-complete`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ order_id:state.orderId, services, date:state.date, timeSlot:state.timeSlot, amount:total, phone:state.phone, name:state.name, model:state.model || "", brand:state.brand.name, description:state.description }) });
  } catch (err) { console.error("Notification error:", err); }
  buildFinalSummary(); goStep(3); setPayLoading(false);
}

function buildFinalSummary() {
  document.getElementById("order-id").textContent = state.orderId ? `Comanda ${state.orderId}` : "";
}

function resetAll() {
  _stopPaymentWorker();
  localStorage.removeItem("gsm_pending_order");
  const check = document.querySelector(".confirm-check");
  check.style.background = "";
  check.querySelector("svg").innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  document.querySelector(".confirm-title").textContent = "Plata efectuata cu succes!";
  document.querySelector(".confirm-sub").innerHTML = "Reparatia ta a fost programata.<br>Te vom contacta in scurt timp.";
  document.getElementById("order-id").textContent = "";
  state = { brand:null, series:null, model:null, cart:[], date:null, timeSlot:null, name:"", phone:"", orderId:null, mode:null, view:'brand', description:"" };
  document.getElementById("problem-input").value = "";
  document.getElementById("description-view").style.display = "none";
  document.querySelectorAll(".time-slot").forEach(s => s.classList.remove("selected"));
  document.getElementById("name-input").value = "";
  document.getElementById("phone-input").value = "";
  document.getElementById("btn-next-0").disabled = true;
  document.getElementById("btn-next-1").disabled = true;
  const fp = document.querySelector("#date-picker")._flatpickr;
  if (fp) { const t = new Date(); t.setDate(t.getDate()+1); fp.setDate(t, true); }
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step-0").classList.add("active");
  currentStep = 0; setDot(0); updateBackBtn();
  showBrands();
}

</script>
